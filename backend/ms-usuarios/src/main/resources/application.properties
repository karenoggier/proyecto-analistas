spring.application.name=ms-usuarios
server.port=8080
server.servlet.context-path=/usuariosMs

# CONFIGURACIÓN DE LA BASE DE DATOS 
spring.datasource.url=jdbc:postgresql://localhost:5431/usuarios_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURACIÓN DE JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# CONFIGURACIÓN JWT
jwt.secret=${JWT_SECRET:c2VjcmV0b19zdXBlcl9segdyb19wYXJhX2Rlc2YXJyb2xsb19lbiVsYWN1bA==}
#jwt.expiration=${JWT_EXPIRATION}
#jwt.issuer=${JWT_ISSUER}

# CONFIGURACIÓN SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.seminario.ms_usuarios.controller
springdoc.show-actuator=true