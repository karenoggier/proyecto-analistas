spring.application.name=ms-pedido
server.port=8082
server.servlet.context-path=/pedidoMs

# Configuración base de datos postgreSQL PEDIDOS
spring.datasource.url=jdbc:postgresql://localhost:5433/pedidos_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURACIÓN DE JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuracion base de datos MongoDB CARRITO
spring.mongodb.uri=mongodb://localhost:27018/carrito_db
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# CONFIGURACIÓN SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.seminario.ms_pedido.controller
springdoc.show-actuator=true

# CONFIGURACIÓN DE MICROSERVICIOS EXTERNOS
usuarios.ms.url=http://localhost:8080
catalogo.ms.url=http://localhost:8081

# CONFIGURACIÓN JWT
jwt.secret=${JWT_SECRET_KEY:c2VjcmV0b19zdXBlcl9segdyb19wYXJhX2Rlc2YXJyb2xsb19lbiVsYWN1bA==}

# CONFIGURACIÓN DE CIRCUIT BREAKER (Resilience4j)
resilience4j.circuitbreaker.instances.usuarioClient.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.usuarioClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.usuarioClient.failureRateThreshold=50.0
resilience4j.circuitbreaker.instances.usuarioClient.slowCallRateThreshold=50.0
resilience4j.circuitbreaker.instances.usuarioClient.slowCallDurationThreshold=2000
resilience4j.circuitbreaker.instances.usuarioClient.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.usuarioClient.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.usuarioClient.waitDurationInOpenState=10000

# CONFIGURACIÓN DE REINTENTOS
resilience4j.retry.instances.usuarioClient.maxAttempts=3
resilience4j.retry.instances.usuarioClient.waitDuration=1s
resilience4j.retry.instances.usuarioClient.retryExceptions=java.io.IOException,java.net.SocketTimeoutException,org.springframework.web.client.ResourceAccessException

# ESTA ES LA LÍNEA QUE FRENA EL ERROR DE HIBERNATE
resilience4j.retry.instances.usuarioClient.ignoreExceptions=com.seminario.ms_pedido.exception.RequestException