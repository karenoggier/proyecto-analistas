services:
# --- BASE DE DATOS USUARIOS (SQL) ---
  usuario-db:
    image: postgres:15-alpine
    container_name: usuario-db
    ports:
      - "5431:5432" 
    environment:
      - POSTGRES_DB=usuarios_db      # La BD se crea sola con este nombre
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
    volumes:
      - ./docker/data/usuarios:/var/lib/postgresql/data
    networks:
      - app-network

# --- BASE DE DATOS CATÁLOGO (NoSQL) ---
  catalogo-db:
    image: mongo:latest
    container_name: catalogo-db
    ports:
      - "27017:27017" 
    volumes:
      - ./docker/data/catalogo:/data/db 
    networks:
      - app-network

networks:
  app-network:
    driver: bridge